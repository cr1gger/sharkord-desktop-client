<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'self'" />
  <title>Демонстрация экрана</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: "Segoe UI", system-ui, sans-serif;
      background: #0d1117; color: #e6edf3;
      display: flex; flex-direction: column; gap: 12px;
      padding: 16px; overflow: hidden; /* сам body никогда не скроллится */
    }
    h1 { font-size: 15px; margin: 0; font-weight: 600; flex: 0 0 auto; }

    /* Прокручиваемая область — единственная, где может появиться скролл (только вертикальный) */
    .grid-wrap {
      flex: 1 1 auto; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      margin: -4px; padding: 4px; /* запас, чтобы hover-обводка не обрезалась */
    }
    .grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
      justify-content: center; /* центрируем плитки, когда ряд неполный */
    }
    .src {
      min-width: 0; /* критично: разрешаем колонкам/плиткам сжиматься */
      background: #161b22; border: 2px solid transparent; border-radius: 10px;
      padding: 8px; cursor: pointer; transition: border-color .12s, transform .12s;
      text-align: center;
    }
    .src:hover { border-color: #1f6feb; transform: translateY(-2px); }
    .src .thumb {
      width: 100%; aspect-ratio: 16 / 9; height: auto; object-fit: cover;
      border-radius: 6px; background: #0d1117; display: block; min-width: 0;
    }
    .label {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
      font-size: 12px; line-height: 1.3; min-width: 0;
    }
    .label img { width: 16px; height: 16px; flex: 0 0 16px; }
    .label span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

    .footer { flex: 0 0 auto; display: flex; justify-content: flex-end; }
    button {
      background: #21262d; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #30363d; }
    .empty { color: #8b949e; padding: 40px; text-align: center; grid-column: 1 / -1; }
  </style>
</head>
<body>
  <h1>Выберите экран или окно для демонстрации</h1>
  <div class="grid-wrap"><div id="grid" class="grid"></div></div>
  <div class="footer"><button id="cancel">Отмена</button></div>
  <script src="picker.js"></script>
</body>
</html>
