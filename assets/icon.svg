    <path d="M159.4 168.0 L172.0 166.0 L165.7 149.1 Z" fill="#fff"/>
    <!-- жабры -->
    <path d="M58 128 q7 8 5 20 M67 126 q7 8 5 20" stroke="#0d1117" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M198 128 q-7 8 -5 20 M189 126 q-7 8 -5 20" stroke="#0d1117" stroke-width="4" fill="none" stroke-linecap="round"/>
