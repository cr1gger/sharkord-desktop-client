    <path d="M68 150 C50 166 44 178 42 184 C60 178 74 173 86 168 Z" fill="#fff"/>
    <path d="M188 150 C206 166 212 178 214 184 C196 178 182 173 170 168 Z" fill="#fff"/>
    <path d="M128 40 C152 58 196 78 204 122 C210 168 178 210 128 210 C78 210 46 168 52 122 C60 78 104 58 128 40 Z" fill="#fff"/>
    <!-- распахнутая пасть -->
    <path d="M68 110 Q128 100 188 110 Q190 150 150 166 Q128 172 106 166 Q66 150 68 110 Z" fill="#0d1117"/>
    <!-- верхний ряд клыков -->
    <path d="M74.0 110.0 L87.5 106.5 L80.8 130.1 Z" fill="#fff"/>
    <path d="M87.5 106.5 L101.0 104.0 L94.3 127.1 Z" fill="#fff"/>
    <path d="M101.0 104.0 L114.5 102.5 L107.8 125.1 Z" fill="#fff"/>
    <path d="M114.5 102.5 L128.0 102.0 L121.3 124.1 Z" fill="#fff"/>
    <path d="M128.0 102.0 L141.5 102.5 L134.8 124.1 Z" fill="#fff"/>
    <path d="M141.5 102.5 L155.0 104.0 L148.3 125.1 Z" fill="#fff"/>
    <path d="M155.0 104.0 L168.5 106.5 L161.8 127.1 Z" fill="#fff"/>
    <path d="M168.5 106.5 L182.0 110.0 L175.3 130.1 Z" fill="#fff"/>
    <!-- нижний ряд клыков -->
    <path d="M84.0 166.0 L96.6 168.0 L90.3 149.1 Z" fill="#fff"/>
    <path d="M96.6 168.0 L109.1 169.3 L102.9 150.7 Z" fill="#fff"/>
