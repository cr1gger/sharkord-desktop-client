<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Маскот Sharkord: злая акула анфас с распахнутой зубастой пастью.
       Без подложки (прозрачный фон), во весь размер, с тёмной обводкой по
       контуру — читается и на тёмной, и на светлой панели. Обводка = тёмная
       копия силуэта/плавников с толстым штрихом, поверх — белая заливка. -->
  <g transform="translate(128 128) scale(1.26) translate(-128 -125)">
    <!-- обводка (тёмная «подложка» силуэта + плавников) -->
    <path d="M68 150 C50 166 44 178 42 184 C60 178 74 173 86 168 Z" fill="#0d1117" stroke="#0d1117" stroke-width="12" stroke-linejoin="round"/>
    <path d="M188 150 C206 166 212 178 214 184 C196 178 182 173 170 168 Z" fill="#0d1117" stroke="#0d1117" stroke-width="12" stroke-linejoin="round"/>
    <path d="M128 40 C152 58 196 78 204 122 C210 168 178 210 128 210 C78 210 46 168 52 122 C60 78 104 58 128 40 Z" fill="#0d1117" stroke="#0d1117" stroke-width="12" stroke-linejoin="round"/>
